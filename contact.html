<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParcelPro - Contact Us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- Navigation -->
    <nav class="bg-white shadow-lg fixed w-full z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-indigo-600">ParcelPro</h1>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="index.html" class="text-gray-700 hover:text-indigo-600 transition">Home</a>
                    <a href="track.html" class="text-gray-700 hover:text-indigo-600 transition">Track Parcel</a>
                    <a href="contact.html" class="text-gray-700 hover:text-indigo-600 transition">Contact</a>
                    <button id="trackBtn"
                        class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700 transition">
                        Quick Track
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Contact Section -->
    <section class="pt-24 pb-16">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-8 text-center">Contact Us</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-white p-6 rounded-lg shadow-md">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Get in Touch</h2>
                    <form id="contactForm">
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2" for="name">Name</label>
                            <input type="text" id="name"
                                class="w-full px-4 py-2 rounded-md border focus:outline-none focus:ring-2 focus:ring-indigo-600"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2" for="email">Email</label>
                            <input type="email" id="email"
                                class="w-full px-4 py-2 rounded-md border focus:outline-none focus:ring-2 focus:ring-indigo-600"
                                required>
                        </div>
                        <div class="mb-4">
                            <label class="block text-gray-700 mb-2" for="message">Message</label>
                            <textarea id="message"
                                class="w-full px-4 py-2 rounded-md border focus:outline-none focus:ring-2 focus:ring-indigo-600"
                                rows="4" required></textarea>
                        </div>
                        <button type="submit"
                            class="bg-indigo-600 text-white px-6 py-2 rounded-md hover:bg-indigo-700 transition w-full">
                            Send Message
                        </button>
                    </form>
                </div>
                <div>
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Contact Information</h2>
                    <p class="text-gray-600 mb-2">📧 Email: support@parcelpro.com</p>
                    <p class="text-gray-600 mb-2">📞 Phone: +1 (555) 123-4567</p>
                    <p class="text-gray-600">📍 Address: 123 Delivery St, Parcel City</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p>© 2025 ParcelPro. All rights reserved.</p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const trackBtn = document.getElementById('trackBtn');
            const contactForm = document.getElementById('contactForm');

            trackBtn.addEventListener('click', () => {
                const trackingNumber = prompt('Enter your tracking number:');
                if (trackingNumber) {
                    window.location.href = `track.html?tracking=${trackingNumber}`;
                }
            });

            contactForm.addEventListener('submit', (e) => {
                e.preventDefault();
                alert('Thank you for your message! We’ll get back to you soon.');
                contactForm.reset();
            });
        });
    </script>
</body>

</html>
